}

message GetCameraWhiteBalanceRedResponse {
  int64 value = 1;
  int64 default_value = 2;
  int64 step = 3;
  int64 minimum = 4;
  int64 maximum = 5;
}

message SetCameraWhiteBalanceRedRequest {
  int64 value = 1;
}

message SetCameraWhiteBalanceRedResponse {
  //
}

// ---------------------
// white balance blue
// ---------------------

message GetCameraWhiteBalanceBlueRequest {
  //
}

message GetCameraWhiteBalanceBlueResponse {
  int64 value = 1;
  int64 default_value = 2;
  int64 step = 3;
  int64 minimum = 4;
  int64 maximum = 5;
}

message SetCameraWhiteBalanceBlueRequest {
  int64 value = 1;
}

message SetCameraWhiteBalanceBlueResponse {
