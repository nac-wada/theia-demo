syntax = "proto3";

package solo.v1;

option go_package = "github.com/mkrless/solo/gen/go/solo/v1;solov1";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

service SoloService {
  // サービスの疎通テストを実行する
  rpc SayHello (SayHelloRequest) returns (SayHelloResponse) {}
  // ビルド情報を取得する
  rpc GetBuildInfo (GetBuildInfoRequest) returns (GetBuildInfoResponse) {}

  // すべてのサービスのビルド情報を取得する
  rpc GetBuildInfoAll (GetBuildInfoAllRequest) returns (GetBuildInfoAllResponse) {}

  // ライブストリームにWebRTC接続する
  rpc ConnectToLiveStream (ConnectToLiveStreamRequest) returns (ConnectToLiveStreamResponse) {}

  // MP4ファイルがトリミングに対応しているかどうか確認する
  rpc CheckTrimMP4FileSupported (CheckTrimMP4FileSupportedRequest) returns (CheckTrimMP4FileSupportedResponse) {}
  // MP4ファイルを指定した時間でトリミングする
  rpc TrimMP4File (TrimMP4FileRequest) returns (TrimMP4FileResponse) {}

  // カメラのニックネーム設定
  rpc GetCameraNickname (GetCameraNicknameRequest) returns (GetCameraNicknameResponse) {}
  rpc SetCameraNickname (SetCameraNicknameRequest) returns (SetCameraNicknameResponse) {}
  // カメラのプライオリティ設定
  rpc GetCameraPriority (GetCameraPriorityRequest) returns (GetCameraPriorityResponse) {}
  rpc SetCameraPriority (SetCameraPriorityRequest) returns (SetCameraPriorityResponse) {}


  // ##########################
  // Camera
  // ##########################

  // white balance auto
  rpc GetCameraWhiteBalanceAuto (GetCameraWhiteBalanceAutoRequest) returns (GetCameraWhiteBalanceAutoResponse) {}
  rpc SetCameraWhiteBalanceAuto (SetCameraWhiteBalanceAutoRequest) returns (SetCameraWhiteBalanceAutoResponse) {}

  // white balance red
  rpc GetCameraWhiteBalanceRed (GetCameraWhiteBalanceRedRequest) returns (GetCameraWhiteBalanceRedResponse) {}
  rpc SetCameraWhiteBalanceRed (SetCameraWhiteBalanceRedRequest) returns (SetCameraWhiteBalanceRedResponse) {}

  // white balance blue
  rpc GetCameraWhiteBalanceBlue (GetCameraWhiteBalanceBlueRequest) returns (GetCameraWhiteBalanceBlueResponse) {}
  rpc SetCameraWhiteBalanceBlue (SetCameraWhiteBalanceBlueRequest) returns (SetCameraWhiteBalanceBlueResponse) {}

  // gamma
  rpc GetCameraGamma (GetCameraGammaRequest) returns (GetCameraGammaResponse) {}
  rpc SetCameraGamma (SetCameraGammaRequest) returns (SetCameraGammaResponse) {}
  
  // exposure
  rpc GetCameraExposure (GetCameraExposureRequest) returns (GetCameraExposureResponse) {}
  rpc SetCameraExposure (SetCameraExposureRequest) returns (SetCameraExposureResponse) {}

  // exposure auto
  rpc GetCameraExposureAuto (GetCameraExposureAutoRequest) returns (GetCameraExposureAutoResponse) {}
  rpc SetCameraExposureAuto (SetCameraExposureAutoRequest) returns (SetCameraExposureAutoResponse) {}

  // exposure absolute
  rpc GetCameraExposureAbsolute (GetCameraExposureAbsoluteRequest) returns (GetCameraExposureAbsoluteResponse) {}
  rpc SetCameraExposureAbsolute (SetCameraExposureAbsoluteRequest) returns (SetCameraExposureAbsoluteResponse) {}

  // exposure auto min
  rpc GetCameraExposureAutoMin (GetCameraExposureAutoMinRequest) returns (GetCameraExposureAutoMinResponse) {}
  rpc SetCameraExposureAutoMin (SetCameraExposureAutoMinRequest) returns (SetCameraExposureAutoMinResponse) {}

  // exposure auto max
  rpc GetCameraExposureAutoMax (GetCameraExposureAutoMaxRequest) returns (GetCameraExposureAutoMaxResponse) {}
  rpc SetCameraExposureAutoMax (SetCameraExposureAutoMaxRequest) returns (SetCameraExposureAutoMaxResponse) {}

  // gain
  rpc GetCameraGain (GetCameraGainRequest) returns (GetCameraGainResponse) {}
  rpc SetCameraGain (SetCameraGainRequest) returns (SetCameraGainResponse) {}

  // gain auto
  rpc GetCameraGainAuto (GetCameraGainAutoRequest) returns (GetCameraGainAutoResponse) {}
  rpc SetCameraGainAuto (SetCameraGainAutoRequest) returns (SetCameraGainAutoResponse) {}

  // gain auto min
  rpc GetCameraGainAutoMin (GetCameraGainAutoMinRequest) returns (GetCameraGainAutoMinResponse) {}
  rpc SetCameraGainAutoMin (SetCameraGainAutoMinRequest) returns (SetCameraGainAutoMinResponse) {}

  // gain auto max
  rpc GetCameraGainAutoMax (GetCameraGainAutoMaxRequest) returns (GetCameraGainAutoMaxResponse) {}
  rpc SetCameraGainAutoMax (SetCameraGainAutoMaxRequest) returns (SetCameraGainAutoMaxResponse) {}

  // frame size
  rpc GetCameraActualFrameSize (GetCameraActualFrameSizeRequest) returns (GetCameraActualFrameSizeResponse) {}

  // frame rate
  rpc GetCameraActualFrameRate (GetCameraActualFrameRateRequest) returns (GetCameraActualFrameRateResponse) {}

  // カメラ画像の反転
  rpc GetCameraImageFlipping (GetCameraImageFlippingRequest) returns (GetCameraImageFlippingResponse) {}
  rpc SetCameraImageFlipping (SetCameraImageFlippingRequest) returns (SetCameraImageFlippingResponse) {}


  // ##########################
  // Clock
  // ##########################

  // 現在時刻を取得する
  rpc GetCurrentTime (GetCurrentTimeRequest) returns (GetCurrentTimeResponse) {}
  // システム時刻を取得する
  rpc GetSystemTime (GetSystemTimeRequest) returns (GetSystemTimeResponse) {}
  // システム時刻を設定する
  rpc SetSystemTime (SetSystemTimeRequest) returns (SetSystemTimeResponse) {} 


  // ##########################
  // Power Management
  // ##########################

  // デバイスをシャットダウンする
  rpc ShutdownDevice (ShutdownDeviceRequest) returns (ShutdownDeviceResponse) {}
  // デバイスを再起動する
  rpc RestartDevice (RestartDeviceRequest) returns (RestartDeviceResponse) {}
  // デバイスをメンテナンス(RCM)モードで起動する
  rpc EnterRCM (EnterRCMRequest) returns (EnterRCMResponse) {}
  // 給電時にカメラの電源をONにするか、設定値を取得する
  rpc GetDeviceAutoBootModeOnPowerSupply (GetDeviceAutoBootModeOnPowerSupplyRequest) returns (GetDeviceAutoBootModeOnPowerSupplyResponse) {}
  // 給電時にカメラの電源をONにするかどうか設定する
  rpc SetDeviceAutoBootModeOnPowerSupply (SetDeviceAutoBootModeOnPowerSupplyRequest) returns (SetDeviceAutoBootModeOnPowerSupplyResponse) {}
  // デバイスの起動時刻を取得する
  rpc GetDeviceBootTime (GetDeviceBootTimeRequest) returns (GetDeviceBootTimeResponse) {}
  // デバイスのサーマルシャットダウンの有効化状態を取得する
  rpc GetDeviceThermalShutdownEnabled (GetDeviceThermalShutdownEnabledRequest) returns (GetDeviceThermalShutdownEnabledResponse) {}
  // デバイスのサーマルシャットダウンの有効/無効を設定する
  rpc SetDeviceThermalShutdownEnabled (SetDeviceThermalShutdownEnabledRequest) returns (SetDeviceThermalShutdownEnabledResponse) {}
  // Jetsonの電源モード(nvpmodel)を取得する
  rpc GetMainboardPowerMode (GetMainboardPowerModeRequest) returns (GetMainboardPowerModeResponse) {}
  // Jetsonの電源モード(nvpmodel)を設定する
  rpc SetMainboardPowerMode (SetMainboardPowerModeRequest) returns (SetMainboardPowerModeResponse) {}
  // Jetsonのファンスピードを取得する
  rpc GetDeviceFanSpeedControl (GetDeviceFanSpeedControlRequest) returns (GetDeviceFanSpeedControlResponse) {}
  // Jetsonのファンスピードを設定する
  rpc SetDeviceFanSpeedControl (SetDeviceFanSpeedControlRequest) returns (SetDeviceFanSpeedControlResponse) {}

  
  // ##########################
  // Record / Trimming
  // ##########################

  // 録画・トリミング
  rpc StartRecorder (StartRecorderRequest) returns (StartRecorderResponse) {}
  rpc StopRecorder (StopRecorderRequest) returns (StopRecorderResponse) {}
  // 指定した時刻から、指定した時間だけ録画する
  rpc StartRecorderWithDuration (StartRecorderWithDurationRequest) returns (StartRecorderWithDurationResponse) {}
  rpc TrimRecorder (TrimRecorderRequest) returns (TrimRecorderResponse) {}
  rpc ShutdownRecorderAll (ShutdownRecorderAllRequest) returns (ShutdownRecorderAllResponse) {}

  // 録画状態管理
  rpc GetRecordingKeys (GetRecordingKeysRequest) returns (GetRecordingKeysResponse) {}
  rpc CheckRecordingKeyExists (CheckRecordingKeyExistsRequest) returns (CheckRecordingKeyExistsResponse) {}
  rpc GetRecordingFileTimeLength (GetRecordingFileTimeLengthRequest) returns (GetRecordingFileTimeLengthResponse) {}
  rpc GetRecordingStartTime (GetRecordingStartTimeRequest) returns (GetRecordingStartTimeResponse) {}
  rpc GetRecordingKeyStatus (GetRecordingKeyStatusRequest) returns (GetRecordingKeyStatusResponse) {}


  // ##########################
  // Recorded MP4
  // ##########################

  // 録画ファイル数を取得
  rpc GetRecordedFileCount (GetRecordedFileCountRequest) returns (GetRecordedFileCountResponse) {}
  // 録画ファイルリストの取得
  rpc GetRecordedFileList (GetRecordedFileListRequest) returns (GetRecordedFileListResponse) {}
  // メタデータ付き録画ファイルリストの取得
  rpc GetRecordedFileListWithMetadatas (GetRecordedFileListWithMetadatasRequest) returns (GetRecordedFileListWithMetadatasResponse) {}
  // 録画ファイルリストを更新
  rpc UpdateRecordedFileList (UpdateRecordedFileListRequest) returns (UpdateRecordedFileListResponse) {}
  // 録画ファイルの削除
  rpc RemoveRecordedFile (RemoveRecordedFileRequest) returns (RemoveRecordedFileResponse) {}
  // 録画ファイルの削除
  rpc RemoveRecordedFiles (RemoveRecordedFilesRequest) returns (RemoveRecordedFilesResponse) {}
  // すべての録画ファイルの削除
  rpc RemoveRecordedFileAll (RemoveRecordedFileAllRequest) returns (RemoveRecordedFileAllResponse) {}
  // 録画ファイルのメタデータを取得
  rpc GetRecordedFileMetadata (GetRecordedFileMetadataRequest) returns (GetRecordedFileMetadataResponse) {}
  // 録画ファイルのメタデータを設定
  rpc SetRecordedFileMetadata (SetRecordedFileMetadataRequest) returns (SetRecordedFileMetadataResponse) {}
  // 録画ファイルが存在するかどうか
  rpc CheckRecordedFileExists (CheckRecordedFileExistsRequest) returns (CheckRecordedFileExistsResponse) {}
  // 録画ファイルにドロップフレームが含まれるか確認する
  rpc GetRecordedFileDroppedFramesInfo (GetRecordedFileDroppedFramesInfoRequest) returns (GetRecordedFileDroppedFramesInfoResponse) {}
  // 録画ファイルに同期が不安定なフレームが含まれるか確認する
  rpc GetRecordedFileUnstableSyncFramesInfo (GetRecordedFileUnstableSyncFramesInfoRequest) returns (GetRecordedFileUnstableSyncFramesInfoResponse) {}
  // 録画ストレージの使用量を取得
  rpc GetRecordingStorageUsage (GetRecordingStorageUsageRequest) returns (GetRecordingStorageUsageResponse) {}
  // 録画ファイルの自動削除の設定値を取得する
  rpc GetRecordingAutoRemoveEnabled (GetRecordingAutoRemoveEnabledRequest) returns (GetRecordingAutoRemoveEnabledResponse) {}
  // 録画ファイルの自動削除の有効・無効を設定する
  rpc SetRecordingAutoRemoveEnabled (SetRecordingAutoRemoveEnabledRequest) returns (SetRecordingAutoRemoveEnabledResponse) {}


  // ##########################
  // Calibration
  // ##########################

  // キャリブレーション治具を撮影する
  rpc TakeCalibrationSnapshot (TakeCalibrationSnapshotRequest) returns (TakeCalibrationSnapshotResponse) {}
  // キャリブレーション撮影を最初の状態に戻す
  rpc ResetCalibrationSnapshots (ResetCalibrationSnapshotsRequest) returns (ResetCalibrationSnapshotsResponse) {}
  // キャリブレーション計算を実行する
  rpc RunCalibration (RunCalibrationRequest) returns (RunCalibrationResponse) {}
  // キャリブレーション画像の枚数を取得する
  rpc GetCalibrationSnapshotsCount (GetCalibrationSnapshotsCountRequest) returns (GetCalibrationSnapshotsCountResponse) {}
  // すべての領域のキャリブレーション画像の枚数を取得する
  rpc GetCalibrationSnapshotsCountAll (GetCalibrationSnapshotsCountAllRequest) returns (GetCalibrationSnapshotsCountAllResponse) {}
  // カメラの位置がボードに対してどちらの側にあるか取得する
  rpc GetCalibrationCameraSideAgainstBoard (GetCalibrationCameraSideAgainstBoardRequest) returns (GetCalibrationCameraSideAgainstBoardResponse) {}
  // カメラの位置がボードに対してどちらの側にあるか設定する
  rpc SetCalibrationCameraSideAgainstBoard (SetCalibrationCameraSideAgainstBoardRequest) returns (SetCalibrationCameraSideAgainstBoardResponse) {}
  // キャリブレーション結果を取得する
  rpc GetCalibrationResult (GetCalibrationResultRequest) returns (GetCalibrationResultResponse) {}
  // キャリブレーション結果が存在するか確認する
  rpc CheckCalibrationResultExists (CheckCalibrationResultExistsRequest) returns (CheckCalibrationResultExistsResponse) {}
  // キャリブレーションエンジンの状態を取得する
  rpc GetCalibrationEngineStatus (GetCalibrationEngineStatusRequest) returns (GetCalibrationEngineStatusResponse) {}
  // キャリブレーションエンジンの状態を設定する（外部クライアントからは使用しないこと）
  rpc SetCalibrationEngineStatus (SetCalibrationEngineStatusRequest) returns (SetCalibrationEngineStatusResponse) {}
  // キャリブレーション結果を設定する
  rpc SetCalibrationResult (SetCalibrationResultRequest) returns (SetCalibrationResultResponse) {}
  // キャリブレーション結果を削除する
  rpc RemoveCalibrationResult (RemoveCalibrationResultRequest) returns (RemoveCalibrationResultResponse) {}
  // キャリブレーション画像を取得する
  rpc GetCalibrationImageData (GetCalibrationImageDataRequest) returns (GetCalibrationImageDataResponse) {}
  // キャリブレーションデータの取得日時を取得する
  rpc GetCalibrationResultUpdateTimestamp (GetCalibrationResultUpdateTimestampRequest) returns (GetCalibrationResultUpdateTimestampResponse) {}


  // ##########################
  // キャリブレーションマーカー
  // ##########################

  // キャリブレータ検出モードの取得
  rpc GetCalibratorDetectionMode (GetCalibratorDetectionModeRequest) returns (GetCalibratorDetectionModeResponse) {}
  // キャリブレータ検出モードの設定
  rpc SetCalibratorDetectionMode (SetCalibratorDetectionModeRequest) returns (SetCalibratorDetectionModeResponse) {}
  // 最後に検出されたLフレームマーカー位置を返す
  rpc GetLatestLFrameMarkerLocation (GetLatestLFrameMarkerLocationRequest) returns (GetLatestLFrameMarkerLocationResponse) {}
  // 最後に検出されたTワンドマーカー位置を返す
  rpc GetLatestTWandMarkerLocation (GetLatestTWandMarkerLocationRequest) returns (GetLatestTWandMarkerLocationResponse) {}
  // Lフレームマーカー位置をストリームで返す
  rpc GetLFrameMarkerLocationStream (GetLFrameMarkerLocationStreamRequest) returns (stream GetLFrameMarkerLocationStreamResponse) {}
  // Tワンドマーカー位置をストリームで返す
  rpc GetTWandMarkerLocationStream (GetTWandMarkerLocationStreamRequest) returns (stream GetTWandMarkerLocationStreamResponse) {}
  // 計算に必要なマーカーデータをセットする
  rpc SetCalibrationLFrameMarkerSet (SetCalibrationLFrameMarkerSetRequest) returns (SetCalibrationLFrameMarkerSetResponse) {}
  // 計算に必要なマーカーデータをセットする
  rpc SetCalibrationTWandMarkerSet (SetCalibrationTWandMarkerSetRequest) returns (SetCalibrationTWandMarkerSetResponse) {}
 

  // ##########################
  // Device
  // ##########################

  // デバイス探索
  rpc GetDevices (GetDevicesRequest) returns (GetDevicesResponse) {}
  rpc GetDeviceActiveNetworkInterfaces (GetDeviceActiveNetworkInterfacesRequest) returns (GetDeviceActiveNetworkInterfacesResponse) {}
  rpc GetDeviceSerialNumber (GetDeviceSerialNumberRequest) returns (GetDeviceSerialNumberResponse) {}
  rpc GetDeviceHostname (GetDeviceHostnameRequest) returns (GetDeviceHostnameResponse) {}
  rpc GetDeviceCPUUsage (GetDeviceCPUUsageRequest) returns (GetDeviceCPUUsageResponse) {}
  rpc GetDeviceMemoryUsage (GetDeviceMemoryUsageRequest) returns (GetDeviceMemoryUsageResponse) {}
  rpc GetDeviceDiskUsage (GetDeviceDiskUsageRequest) returns (GetDeviceDiskUsageResponse) {}
  rpc GetDeviceResourceUsage (GetDeviceResourceUsageRequest) returns (GetDeviceResourceUsageResponse) {}
  // デバイスの各種温度を取得する
  rpc GetDeviceTemperature (GetDeviceTemperatureRequest) returns (GetDeviceTemperatureResponse) {}
  // SSD S.M.A.R.T. values
  rpc GetDeviceStorageStatus (GetDeviceStorageStatusRequest) returns (GetDeviceStorageStatusResponse) {}
  // デバイスの同期状態
  rpc GetDeviceSyncStatus (GetDeviceSyncStatusRequest) returns (GetDeviceSyncStatusResponse) {}
  // カメラの同期モード
  rpc GetDeviceSyncMode (GetDeviceSyncModeRequest) returns (GetDeviceSyncModeResponse) {}
  // 同期IDを取得する
  rpc GetDeviceSyncId (GetDeviceSyncIdRequest) returns (GetDeviceSyncIdResponse) {}
  // バージョン情報
  rpc GetDeviceVersion (GetDeviceVersionRequest) returns (GetDeviceVersionResponse) {}
  // UNISONet Unitを追加
  rpc AddDeviceUNISONetUnit (AddDeviceUNISONetUnitRequest) returns (AddDeviceUNISONetUnitResponse) {}
  // UNISONet Unitを削除
  rpc RemoveDeviceUNISONetUnit (RemoveDeviceUNISONetUnitRequest) returns (RemoveDeviceUNISONetUnitResponse) {}
  // カメラステータスLEDのカスタム設定
  rpc SetDeviceCameraStatusLEDCustom (SetDeviceCameraStatusLEDCustomRequest) returns (SetDeviceCameraStatusLEDCustomResponse) {}

  
  // ##########################
  // Wi-Fi
  // ##########################

  // WiFi機能が利用可能かどうか取得する
  rpc GetWiFiFunctionsAvailable (GetWiFiFunctionsAvailableRequest) returns (GetWiFiFunctionsAvailableResponse) {}
  // Wi-Fiアクセスポイントの取得
  rpc GetWiFiNetworks (GetWiFiNetworksRequest) returns (GetWiFiNetworksResponse) {}
  // Wi-Fiネットワークを再スキャンする
  rpc RescanWiFiNetworks (RescanWiFiNetworksRequest) returns (RescanWiFiNetworksResponse) {}
  // 新しいWi-Fiアクセスポイントに接続する
  rpc ConnectToNewWiFiNetwork (ConnectToNewWiFiNetworkRequest) returns (ConnectToNewWiFiNetworkResponse) {} 
  // Wi-Fiアクセスポイントに接続する
  rpc ConnectToWiFiNetwork (ConnectToWiFiNetworkRequest) returns (ConnectToWiFiNetworkResponse) {} 
  // Wi-Fiアクセスポイントから切断する
  rpc DisconnectFromWiFiNetwork (DisconnectFromWiFiNetworkRequest) returns (DisconnectFromWiFiNetworkResponse) {} 
  // Wi-Fiアクセスポイントの設定を削除する
  rpc RemoveWiFiNetwork (RemoveWiFiNetworkRequest) returns (RemoveWiFiNetworkResponse) {}
  // Wi-Fiが有効かどうか確認する
  rpc CheckWiFiEnabled (CheckWiFiEnabledRequest) returns (CheckWiFiEnabledResponse) {}
  // Wi-Fiを有効化する
  rpc EnableWiFi (EnableWiFiRequest) returns (EnableWiFiResponse) {}
  // Wi-Fiを無効化する
  rpc DisableWiFi (DisableWiFiRequest) returns (DisableWiFiResponse) {}
  // Wi-Fiアクセスポイントに接続されていることを確認する
  rpc CheckWiFiNetworkConnection (CheckWiFiNetworkConnectionRequest) returns (CheckWiFiNetworkConnectionResponse) {}
  // インターネット接続確認
  rpc CheckInternetConnection (CheckInternetConnectionRequest) returns (CheckInternetConnectionResponse) {}
  // Wi-Fiパスワードの暗号化用の公開鍵を取得する
  rpc GetWiFiAPIPublicKey (GetWiFiAPIPublicKeyRequest) returns (GetWiFiAPIPublicKeyResponse) {}


  // ##########################
  // Messaging
  // ##########################

  // イベントをクライアントにブロードキャスト送信する
  rpc BroadcastEvent (BroadcastEventRequest) returns (BroadcastEventResponse) {}
  // イベントを受信するためのストリームを取得する
  rpc SubscribeEvent (SubscribeEventRequest) returns (stream SubscribeEventResponse) {}


  // ##########################
  // Firmware Version
  // ##########################

  // ファームウェアバージョン
  rpc GetFirmwareVersion (GetFirmwareVersionRequest) returns (GetFirmwareVersionResponse) {}
  // ファームウェアアップデート
  rpc UpdateFirmware (UpdateFirmwareRequest) returns (UpdateFirmwareResponse) {}
  // 製造時シリアル番号
  rpc GetProductSerialNumber (GetProductSerialNumberRequest) returns (GetProductSerialNumberResponse) {}
  // 製造時バージョン
  rpc GetProductVersion (GetProductVersionRequest) returns (GetProductVersionResponse) {}


  // ##########################
  // 無線同期
  // ##########################

  // デバイスの同期が確立しているかどうか確認する
  rpc IsDeviceSyncEstablished (IsDeviceSyncEstablishedRequest) returns (IsDeviceSyncEstablishedResponse) {}
  // カメラの同期が最後に確立した時間を取得する
  rpc GetDeviceSyncLastEstablishedTime (GetDeviceSyncLastEstablishedTimeRequest) returns (GetDeviceSyncLastEstablishedTimeResponse) {}
  // カメラの同期が最後に失敗した時間を取得する
  rpc GetDeviceSyncLastFailedTime (GetDeviceSyncLastFailedTimeRequest) returns (GetDeviceSyncLastFailedTimeResponse) {}
  // デバイスの中心周波数を取得する
  rpc GetDeviceSyncCf (GetDeviceSyncCfRequest) returns (GetDeviceSyncCfResponse) {}
  // デバイスの中心周波数を設定する（親機のみ可、子機は親機に追随する）
  rpc SetDeviceSyncCf (SetDeviceSyncCfRequest) returns (SetDeviceSyncCfResponse) {}
  // デバイスの送信出力を取得する
  rpc GetDeviceSyncTxPower (GetDeviceSyncTxPowerRequest) returns (GetDeviceSyncTxPowerResponse) {}
  // デバイスの送信出力を設定する
  rpc SetDeviceSyncTxPower (SetDeviceSyncTxPowerRequest) returns (SetDeviceSyncTxPowerResponse) {}


  // ##########################
  // ファクトリリセット
  // ##########################

  // ファクトリリセットを実行する
  rpc ExecuteFactoryReset (ExecuteFactoryResetRequest) returns (ExecuteFactoryResetResponse) {}
}

message SayHelloRequest {
  string name = 1;
  optional google.protobuf.Duration delay = 2;
}

message SayHelloResponse {
  bool success = 1;
  string message = 2;
}

message BuildInfo {
  string hash_id = 1;
  string tag = 2;
  google.protobuf.Timestamp build_time = 3;
}

message ServiceBuildInfo {
  string service_name = 1;
  BuildInfo build_info = 2;
}

message GetBuildInfoRequest {
  //
}

message GetBuildInfoResponse {
  bool success = 1;
  BuildInfo build_info = 2;
}

message GetBuildInfoAllRequest {
  //
}

message GetBuildInfoAllResponse {
  bool success = 1;
  repeated ServiceBuildInfo services = 2;
}

message Session {
  string sdp = 1;
  repeated string ices = 2;
}

message ConnectToLiveStreamRequest {
  Session client = 1;
}

message ConnectToLiveStreamResponse {
  Session service = 1;
  bool success = 2;
}

message CheckTrimMP4FileSupportedRequest {
  string file_name = 1;
}

message CheckTrimMP4FileSupportedResponse {
  enum TrimMP4FileSupportLevel {
    TRIM_MP4_FILE_SUPPORT_LEVEL_UNSPECIFIED = 0;
    TRIM_MP4_FILE_SUPPORT_LEVEL_NOTSUPPORTED = 1;
    TRIM_MP4_FILE_SUPPORT_LEVEL_LIMITED = 2;
    TRIM_MP4_FILE_SUPPORT_LEVEL_FULL = 3;
  }

  TrimMP4FileSupportLevel level = 1;
}

message TrimMP4FileRequest {
  enum TrimMP4FileMode {
    TRIM_MP4_FILE_MODE_UNSPECIFIED = 0;
    TRIM_MP4_FILE_MODE_TIME = 1;
    TRIM_MP4_FILE_MODE_FORCE_KEYFRAME = 2;
    TRIM_MP4_FILE_MODE_FORCE_KEYFRAME_SYNC = 3;
  }

  TrimMP4FileMode mode = 1;
  string file_name = 2;
  google.protobuf.Duration start = 3;
  google.protobuf.Duration length = 4;
}

message TrimMP4FileResponse {
  bool success = 1;
  string filename = 2;
}

message GetCameraNicknameRequest {
  //
}

message GetCameraNicknameResponse {
  string nickname = 1;
}

message SetCameraNicknameRequest {
  string nickname = 1;
}

message SetCameraNicknameResponse {
  bool success = 1;
}

message GetCameraPriorityRequest {
  //
}

message GetCameraPriorityResponse {
  int32 priority = 1;
}

message SetCameraPriorityRequest {
  int32 priority = 1;
}

message SetCameraPriorityResponse {
  bool success = 1;
}

  
// ##########################
// Camera
// ##########################


// ---------------------
