// ---------------------
// gamma
// ---------------------

message GetCameraGammaRequest {
  //
}

message GetCameraGammaResponse {
  int64 value = 1;
  int64 default_value = 2;
  int64 step = 3;
  int64 minimum = 4;
  int64 maximum = 5;
}

message SetCameraGammaRequest {
  int64 value = 1;
}

message SetCameraGammaResponse {
  //
}

// ---------------------
// exposure
// ---------------------

message GetCameraExposureRequest {
  //
}

message GetCameraExposureResponse {
  int64 value = 1;
  int64 default_value = 2;
  int64 step = 3;
  int64 minimum = 4;
  int64 maximum = 5;
}

message SetCameraExposureRequest {
  int64 value = 1;
}

message SetCameraExposureResponse {
  //
}

// ---------------------
// exposure auto
// ---------------------

